name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-pages.yml"
      - "render.yaml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Static export
        env:
          STATIC_EXPORT: "true"
          NEXT_PUBLIC_BACKEND_API: ${{ secrets.NEXT_PUBLIC_BACKEND_API }}
          NEXT_PUBLIC_FRONTEND_URL: https://amulyavarshney.github.io
          NEXT_PUBLIC_ALLOW_SELF_REGISTRATION: "false"
          NEXT_PUBLIC_MAX_HOURS: "8"
          NEXT_PUBLIC_FETCH_LOCK_INTERVAL: "60000"
        run: |
          if [ -z "$NEXT_PUBLIC_BACKEND_API" ]; then
            echo "Missing secret NEXT_PUBLIC_BACKEND_API (e.g. https://rms-api.onrender.com/api/v1)"
            exit 1
          fi
          npm run build
          # SPA deep-link fallback for GitHub Pages
          cp out/index.html out/404.html

      - name: Deploy to amulyavarshney.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: amulyavarshney/amulyavarshney.github.io
          publish_dir: frontend/out
          publish_branch: main
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
