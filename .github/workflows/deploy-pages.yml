name: Deploy GitHub Pages

# Same-repo Pages (like VitalPlan) — uses GITHUB_TOKEN only, no PAT.
# Site: https://amulyavarshney.github.io/Resource-Management-System/

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-pages.yml"
      - "render.yaml"
  workflow_dispatch:
    inputs:
      api_url:
        description: "NEXT_PUBLIC_BACKEND_API (e.g. https://rms-api.onrender.com/api/v1)"
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Resolve API URL
        id: api
        env:
          INPUT_API: ${{ inputs.api_url }}
          SECRET_API: ${{ secrets.NEXT_PUBLIC_BACKEND_API }}
          VAR_API: ${{ vars.NEXT_PUBLIC_BACKEND_API }}
        run: |
          API_URL="${INPUT_API:-${SECRET_API:-$VAR_API}}"
          if [ -z "$API_URL" ]; then
            echo "::error title=Missing API URL::Set Actions variable or secret NEXT_PUBLIC_BACKEND_API (e.g. https://rms-api.onrender.com/api/v1), or pass api_url on workflow_dispatch."
            exit 1
          fi
          echo "url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Static export
        env:
          STATIC_EXPORT: "true"
          NEXT_PUBLIC_BASE_PATH: /Resource-Management-System
          NEXT_PUBLIC_BACKEND_API: ${{ steps.api.outputs.url }}
          NEXT_PUBLIC_FRONTEND_URL: https://amulyavarshney.github.io/Resource-Management-System
          NEXT_PUBLIC_ALLOW_SELF_REGISTRATION: "false"
          NEXT_PUBLIC_MAX_HOURS: "8"
          NEXT_PUBLIC_FETCH_LOCK_INTERVAL: "60000"
        run: |
          npm run build
          cp out/index.html out/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
