name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check app tests

      - name: Pytest
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          JWT_SECRET: test-secret-key-at-least-32-characters-long
          RATE_LIMIT_ENABLED: "false"
        run: pytest -q

      - name: Export OpenAPI schema
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          JWT_SECRET: test-secret-key-at-least-32-characters-long
          RATE_LIMIT_ENABLED: "false"
          APP_ENV: development
        run: |
          python -m scripts.export_openapi > /tmp/openapi.json
          # Fail if the committed frontend schema drifted from the live FastAPI app
          diff -u ../frontend/openapi.json /tmp/openapi.json

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Verify OpenAPI types are up to date
        run: |
          npm run generate:api:types
          git diff --exit-code -- app/api/generated/openapi.ts

      - name: Build
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-build-secret-not-for-production
          NEXT_PUBLIC_FRONTEND_URL: http://localhost:3000
          NEXT_PUBLIC_BACKEND_API: http://localhost:8000/api/v1
          NEXT_PUBLIC_MAX_HOURS: "8"
          NEXT_PUBLIC_FETCH_LOCK_INTERVAL: "60000"
        run: npm run build

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start API
        working-directory: backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///./e2e.db
          JWT_SECRET: e2e-secret-key-at-least-32-characters-long
          RATE_LIMIT_ENABLED: "false"
          APP_ENV: development
          ALLOWED_ORIGINS: '["http://127.0.0.1:3000","http://localhost:3000"]'
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health/live && exit 0
            sleep 1
          done
          exit 1

      - name: Seed demo accounts
        working-directory: backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///./e2e.db
          JWT_SECRET: e2e-secret-key-at-least-32-characters-long
          APP_ENV: development
        run: python -m scripts.seed_demo

      - name: Build frontend
        working-directory: frontend
        env:
          NEXTAUTH_URL: http://127.0.0.1:3000
          NEXTAUTH_SECRET: e2e-secret-not-for-production
          NEXT_PUBLIC_FRONTEND_URL: http://127.0.0.1:3000
          NEXT_PUBLIC_BACKEND_API: http://127.0.0.1:8000/api/v1
          NEXT_PUBLIC_MAX_HOURS: "8"
          NEXT_PUBLIC_FETCH_LOCK_INTERVAL: "60000"
        run: npm run build

      - name: Run Playwright
        working-directory: frontend
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          NEXTAUTH_URL: http://127.0.0.1:3000
          NEXTAUTH_SECRET: e2e-secret-not-for-production
          NEXT_PUBLIC_FRONTEND_URL: http://127.0.0.1:3000
          NEXT_PUBLIC_BACKEND_API: http://127.0.0.1:8000/api/v1
          BACKEND_API_URL: http://127.0.0.1:8000/api/v1
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  backend-postgres:
    name: Backend (Postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rms
          POSTGRES_PASSWORD: rms
          POSTGRES_DB: rms
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rms -d rms"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://rms:rms@localhost:5432/rms
          JWT_SECRET: test-secret-key-at-least-32-characters-long
          APP_ENV: production
          RATE_LIMIT_ENABLED: "false"
        run: alembic upgrade head

      - name: API smoke against Postgres
        env:
          DATABASE_URL: postgresql+asyncpg://rms:rms@localhost:5432/rms
          JWT_SECRET: test-secret-key-at-least-32-characters-long
          APP_ENV: production
          RATE_LIMIT_ENABLED: "false"
          ALLOW_SELF_REGISTRATION: "true"
          ALLOWED_ORIGINS: '["http://127.0.0.1:3000"]'
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8001 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8001/health/ready && break
            sleep 1
          done
          curl -sf http://127.0.0.1:8001/health/ready | tee /tmp/ready.json
          grep -q '"db":"ok"' /tmp/ready.json
          curl -sf -X POST http://127.0.0.1:8001/api/v1/auth/register \
            -H 'Content-Type: application/json' \
            -d '{"first_name":"Pg","last_name":"Smoke","email":"pg.smoke@rms.example","password":"SecureP@ss1","department":1,"region":1,"role":0,"work_hours_per_day":8,"parent_id":0}'
          TOKEN=$(curl -sf -X POST http://127.0.0.1:8001/api/v1/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"email":"pg.smoke@rms.example","password":"SecureP@ss1"}' \
            | python -c 'import sys, json; print(json.load(sys.stdin))')
          test -n "$TOKEN"
          curl -sf http://127.0.0.1:8001/api/v1/user/me -H "Authorization: Bearer $TOKEN" | tee /tmp/me.json
          grep -q 'pg.smoke@rms.example' /tmp/me.json
