name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check app tests

      - name: Pytest
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          JWT_SECRET: test-secret-key-at-least-32-characters-long
          RATE_LIMIT_ENABLED: "false"
        run: pytest -q

      - name: Export OpenAPI schema
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          JWT_SECRET: test-secret-key-at-least-32-characters-long
          RATE_LIMIT_ENABLED: "false"
          APP_ENV: development
        run: |
          python -m scripts.export_openapi > /tmp/openapi.json
          # Fail if the committed frontend schema drifted from the live FastAPI app
          diff -u ../frontend/openapi.json /tmp/openapi.json

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Verify OpenAPI types are up to date
        run: |
          npm run generate:api:types
          git diff --exit-code -- app/api/generated/openapi.ts

      - name: Build
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-build-secret-not-for-production
          NEXT_PUBLIC_FRONTEND_URL: http://localhost:3000
          NEXT_PUBLIC_BACKEND_API: http://localhost:8000/api/v1
          NEXT_PUBLIC_MAX_HOURS: "8"
          NEXT_PUBLIC_FETCH_LOCK_INTERVAL: "60000"
        run: npm run build

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start API
        working-directory: backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///./e2e.db
          JWT_SECRET: e2e-secret-key-at-least-32-characters-long
          RATE_LIMIT_ENABLED: "false"
          APP_ENV: development
          ALLOWED_ORIGINS: '["http://127.0.0.1:3000","http://localhost:3000"]'
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health/live && exit 0
            sleep 1
          done
          exit 1

      - name: Build frontend
        working-directory: frontend
        env:
          NEXTAUTH_URL: http://127.0.0.1:3000
          NEXTAUTH_SECRET: e2e-secret-not-for-production
          NEXT_PUBLIC_FRONTEND_URL: http://127.0.0.1:3000
          NEXT_PUBLIC_BACKEND_API: http://127.0.0.1:8000/api/v1
          NEXT_PUBLIC_MAX_HOURS: "8"
          NEXT_PUBLIC_FETCH_LOCK_INTERVAL: "60000"
        run: npm run build

      - name: Run Playwright
        working-directory: frontend
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          NEXTAUTH_URL: http://127.0.0.1:3000
          NEXTAUTH_SECRET: e2e-secret-not-for-production
          NEXT_PUBLIC_FRONTEND_URL: http://127.0.0.1:3000
          NEXT_PUBLIC_BACKEND_API: http://127.0.0.1:8000/api/v1
          BACKEND_API_URL: http://127.0.0.1:8000/api/v1
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
