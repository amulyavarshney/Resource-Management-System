services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: unless-stopped

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${DB_SA_PASSWORD:?DB_SA_PASSWORD must be set — no default password is provided}"
      MSSQL_PID: Developer
    # No ports mapping: the api container reaches db over the internal
    # Docker network by service name — publishing 1433 to the host is
    # unnecessary and exposes SQL Server outside the compose network.
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -C -Q "SELECT 1" || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${DB_SA_PASSWORD:?DB_SA_PASSWORD must be set — no default password is provided}"
      MSSQL_HOST: db
      MSSQL_DATABASE: rms
    volumes:
      - ./scripts/mssql_ensure_db.sh:/mssql_ensure_db.sh:ro
    entrypoint: ["/bin/bash", "/mssql_ensure_db.sh"]
    restart: "no"

volumes:
  mssql_data:
