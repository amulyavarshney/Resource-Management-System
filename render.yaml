# Render Blueprint — backend API + managed Postgres
# https://render.com/docs/blueprint-spec
#
# Deploy: connect this repo in Render Dashboard → New → Blueprint
# After deploy, set the frontend secret NEXT_PUBLIC_BACKEND_API to
# https://<this-service>.onrender.com/api/v1

databases:
  - name: rms-db
    plan: free

services:
  - type: web
    name: rms-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile.render
    dockerContext: ./backend
    healthCheckPath: /health/live
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rms-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS512
      - key: JWT_EXPIRE_HOURS
        value: "2"
      - key: JWT_REMEMBER_EXPIRE_HOURS
        value: "336"
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: ALLOW_SELF_REGISTRATION
        value: "false"
      - key: ALLOWED_ORIGINS
        value: '["https://amulyavarshney.github.io","http://localhost:3000"]'
      - key: UVICORN_WORKERS
        value: "2"
      # Optional ESB mail — set in the Render dashboard if needed
      - key: ESB_API_URL
        sync: false
      - key: ESB_SUB_KEY
        sync: false
      - key: ESB_MAIL_FROM
        sync: false
      - key: ESB_MAIL_SENDER
        sync: false
      - key: ESB_MAIL_REPLYTO
        sync: false
      - key: ESB_CALLBACK_POSITIVE_URL
        sync: false
      - key: ESB_CALLBACK_NEGATIVE_URL
        sync: false
